<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Silence benign HMR / WebSocket sandbox connection messages and prevent unhandled rejections
      (function() {
        const isBenignNoise = (str) => {
          if (!str) return false;
          const s = String(str).toLowerCase();
          return s.includes("websocket") || 
                 s.includes("failed to connect") || 
                 s.includes("failed to fetch") || 
                 s.includes("hmr") || 
                 s.includes("vite") || 
                 s.includes("closed without opened") ||
                 s.includes("networkerror") ||
                 s.includes("load failed");
        };

        window.addEventListener("unhandledrejection", function(event) {
          const reason = event.reason;
          if (!reason) return;
          const reasonStr = reason.stack || reason.message || String(reason);
          if (isBenignNoise(reasonStr)) {
            event.preventDefault();
            event.stopPropagation();
            console.warn("[Sanitized Suppressed Rejection]:", reasonStr);
          }
        }, true);

        window.addEventListener("error", function(event) {
          const errorMsg = event.message || "";
          const errorStack = event.error ? (event.error.stack || event.error.message || "") : "";
          if (isBenignNoise(errorMsg) || isBenignNoise(errorStack)) {
            event.preventDefault();
            event.stopPropagation();
            console.warn("[Sanitized Suppressed Error]:", errorMsg);
          }
        }, true);

        // Monkeypatch WebSocket to suppress internal connection error logs by returning a clean mock WebSocket
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          window.WebSocket = function PatchedWebSocket(url, protocols) {
            const urlStr = String(url || "");
            if (
              urlStr.includes("vite") || 
              urlStr.includes("ws://") || 
              urlStr.includes("wss://") || 
              urlStr.includes("localhost") || 
              protocols === "vite-hmr"
            ) {
              console.log("[PatchedWebSocket] Intercepted and blocked HMR WebSocket connection: ", url);
              
              const mockSocket = {
                url: url,
                readyState: 3, // CLOSED state
                bufferedAmount: 0,
                extensions: "",
                protocol: "",
                binaryType: "blob",
                onopen: null,
                onmessage: null,
                onerror: null,
                onclose: null,
                addEventListener: function(type, listener) {
                  if (type === 'close' && listener) {
                    setTimeout(() => {
                      try {
                        listener({ type: 'close', wasClean: true, code: 1000, reason: "Suppressed HMR" });
                      } catch (e) {}
                    }, 50);
                  }
                },
                removeEventListener: function() {},
                send: function() {},
                close: function() {}
              };
              return mockSocket;
            }
            return new OriginalWebSocket(url, protocols);
          };
          window.WebSocket.prototype = OriginalWebSocket.prototype;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
